name: Drift
options:
  bundleIdPrefix: com.stoneros
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES
    PRODUCT_BUNDLE_IDENTIFIER: com.stoneros.Drift

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Drift:
    type: application
    platform: macOS
    sources:
      - path: Drift
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: Sparkle
    settings:
      base:
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: Drift
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Drift/Info.plist
    entitlements:
      path: Drift/Drift.entitlements
      properties:
        com.apple.security.network.client: true
